<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Automação | Alison Gomez</title>
  <meta name="description" content="Detalhes de script, automação ou ferramenta técnica." />
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="matrixCanvas" aria-hidden="true"></canvas>
  <div class="scanline" aria-hidden="true"></div>
  <div class="noise" aria-hidden="true"></div>

  <header class="topbar">
    <a href="index.html#home" class="brand"><span>[</span> ALISON GOMEZ <span>]</span></a>
    <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu"><span></span><span></span><span></span></button>
    <nav class="nav" id="nav">
      <a href="index.html#home">./home</a>
      <a href="index.html#automacoes">./automações</a>
      <a href="automations.html">./catálogo</a>
      <a href="index.html#estudos">./estudos</a>
      <a href="index.html#contato">./contato</a>
    </nav>
  </header>

  <main class="section reports-page">
    <div id="automationRoot"></div>
  </main>

  <footer class="footer"><p>ALISON GOMEZ © <span id="year"></span> // Automação</p></footer>

  <script src="script.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const automationId = params.get("id");

    function list(items) {
      return `<ul>${(items || []).map(item => `<li>${item}</li>`).join("")}</ul>`;
    }

    function tags(items) {
      return `<div class="report-tags">${(items || []).map(item => `<span>${item}</span>`).join("")}</div>`;
    }

    function renderAutomation(item) {
      document.title = `${item.title} | Alison Gomez`;
      return `
        <div class="report-detail-layout">
          <article>
            <section class="report-detail-panel">
              <span class="section-tag">// AUTOMATION_DETAIL</span>
              <h1>${item.title}</h1>
              <p>${item.subtitle}</p>

              <img src="${item.preview}" alt="Preview da automação ${item.title}" class="report-detail-cover" />

              <div class="report-card-meta">
                <span class="report-status">${item.language}</span>
                <span class="report-severity">${item.status}</span>
                <span class="report-badge">${item.category}</span>
              </div>

              ${tags(item.tags)}
            </section>

            <section class="report-detail-card">
              <h2>Resumo</h2>
              <p>${item.summary}</p>
            </section>

            <section class="report-detail-card">
              <h2>Funcionalidades</h2>
              ${list(item.features)}
            </section>

            <section class="report-detail-card">
              <h2>Tecnologias usadas</h2>
              ${tags(item.tech)}
            </section>
          </article>

          <aside>
            <div class="report-aside-card">
              <h3>Dados da automação</h3>
              <p><strong>Categoria:</strong> ${item.category}</p>
              <p><strong>Linguagem:</strong> ${item.language}</p>
              <p><strong>Status:</strong> ${item.status}</p>
              <p><strong>Ano:</strong> ${item.date}</p>

              <div class="report-action-stack">
                <a href="${item.repository}" target="_blank" rel="noreferrer">Abrir GitHub</a>
                <a href="automations.html">Voltar ao catálogo</a>
              </div>
            </div>

            <div class="report-aside-card">
              <h3>Como publicar script real</h3>
              <ul>
                <li>Suba o script em um repositório no GitHub.</li>
                <li>Atualize o campo repository no automations.json.</li>
                <li>Adicione prints, README e instruções de uso.</li>
                <li>Evite publicar tokens, URLs internas e dados de clientes.</li>
              </ul>
            </div>
          </aside>
        </div>
      `;
    }

    fetch("assets/automations/automations.json")
      .then(response => response.json())
      .then(items => {
        const item = items.find(entry => entry.id === automationId) || items[0];
        document.getElementById("automationRoot").innerHTML = renderAutomation(item);
      })
      .catch(() => {
        document.getElementById("automationRoot").innerHTML = `
          <div class="report-empty">Não foi possível carregar esta automação. Verifique o arquivo assets/automations/automations.json.</div>
        `;
      });
  </script>
</body>
</html>
